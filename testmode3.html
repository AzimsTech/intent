<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launch Engineer Mode</title>
</head>
<body>

    <button onclick="launchEngineerMode()">Open Engineer Mode</button>

    <script>
        function launchEngineerMode() {
            // The raw intent URI
            const intentUri = "intent:#Intent;action=android.intent.action.MAIN;category=android.intent.category.DEFAULT;component=com.iqoo.engineermode/.EngineerTest3;end";
            
            // 1. Attempt to launch the intent
            window.location.href = intentUri;

            // 2. Fallback check
            // If the intent succeeds, the browser usually goes into the background.
            // If the app doesn't open or the browser blocks it, the document remains visible.
            setTimeout(function() {
                if (document.visibilityState === 'visible') {
                    console.error("Intent launch failed or was blocked by the browser.");
                    alert("Could not launch Engineer Mode. The browser blocked the request, or the app is not accessible.");
                }
            }, 2000); // 2-second delay to check if the user is still here
        }
    </script>

</body>
</html>
